name: suppsradar-dev
services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: suppsradar
      POSTGRES_USER: suppsradar
      POSTGRES_PASSWORD: suppsradar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U suppsradar -d suppsradar" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1

      # process acts as a broker (stores messages) and a
      # controller (manages cluster metadata)
      KAFKA_PROCESS_ROLES: broker,controller

      # ports kafka listens on
      # INTERNAL   -> other docker containers
      # EXTERNAL   -> application running on the host
      # CONTROLLER -> internal KRaft communication
      KAFKA_LISTENERS: >
        INTERNAL://:9092,
        EXTERNAL://:9094,
        CONTROLLER://:9093

      # addresses Kafka tells clients to connect to
      KAFKA_ADVERTISED_LISTENERS: >
        INTERNAL://kafka:9092,
        EXTERNAL://localhost:9094

      # protocol used for each listener
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT

      # broker-to-broker communication
      # (running a single broker but is required)
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # listener used by the KRaft controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # every controller in the cluster
      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@localhost:9093

      # internal kafka topics
      # (running a single broker so only need one replica)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # permanent identifier for this KRaft cluster
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: suppsradar
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:
