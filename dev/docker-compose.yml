name: suppsradar-dev
services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: suppsradar
      POSTGRES_USER: suppsradar
      POSTGRES_PASSWORD: suppsradar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U suppsradar -d suppsradar" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data: